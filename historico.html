<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
    if (!localStorage.getItem('autenticado_garagem184')) {
        window.location.href = 'login.html';
    }
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico PRO - Garagem 184</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?q=80&w=1920&auto=format&fit=crop'); background-size: cover; background-position: center; background-attachment: fixed; font-family: Arial, sans-serif; color: white; margin: 0; display: flex; justify-content: center; padding-top: 30px; min-height: 100vh; }
        .container { background-color: rgba(30, 30, 30, 0.9); padding: 30px; border-radius: 10px; width: 95%; max-width: 1300px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #007bff; margin-top: 0; }
        .barra-pesquisa { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 5px; border: none; background-color: #555; color: white; font-size: 16px; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #555; font-size: 13px; }
        th { background-color: #444; color: #fff; }
        
        .btn-acao { padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 2px; transition: 0.3s; }
        .btn-editar { background-color: #ffc107; color: black; }
        .btn-apagar { background-color: #dc3545; color: white; }
        .btn-pdf { background-color: #28a745; color: white; }
        .btn-fotos { background-color: #17a2b8; color: white; }
        .btn-acao:hover { opacity: 0.8; transform: scale(1.05); }

        .btn-voltar { display: block; width: 200px; margin: 20px auto 0; padding: 10px; background-color: #6c757d; color: white; border-radius: 5px; text-align: center; text-decoration: none; font-weight: bold; }
        
        /* Estilos do Modal de Fotos */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal-content { margin: 5% auto; padding: 20px; width: 90%; max-width: 1000px; background: #222; border-radius: 10px; position: relative; }
        .close { position: absolute; right: 20px; top: 10px; color: #fff; font-size: 35px; font-weight: bold; cursor: pointer; }
        .galeria-fotos { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .foto-item { position: relative; text-align: center; border: 2px solid #444; border-radius: 8px; overflow: hidden; background: #000; }
        .foto-item img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; transition: 0.3s; }
        .foto-item img:hover { transform: scale(1.1); }
        .btn-download { display: block; background: #007bff; color: white; text-decoration: none; padding: 5px; font-size: 12px; font-weight: bold; }

        .badge-fotos { background: #17a2b8; color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📜 Histórico de Ordens de Serviço</h2>
        
        <input type="text" id="pesquisa" class="barra-pesquisa" placeholder="🔍 Pesquisar por Nº da OS, Cliente ou Placa..." onkeyup="filtrarTabela()">

        <div style="display: flex; gap: 20px; margin-bottom: 25px;">
            <div style="flex: 1; background: #333; padding: 20px; border-radius: 8px; text-align: center; border-left: 5px solid #f1c40f; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
                <h3 style="margin: 0; color: #ccc; font-size: 14px; text-transform: uppercase;">Veículos Atendidos</h3>
                <h2 id="dash-qtd" style="margin: 10px 0 0 0; color: #fff; font-size: 32px;">0</h2>
            </div>
            
            <div style="flex: 1; background: #333; padding: 20px; border-radius: 8px; text-align: center; border-left: 5px solid #2ecc71; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
                <h3 style="margin: 0; color: #ccc; font-size: 14px; text-transform: uppercase;">Faturamento Bruto</h3>
                <h2 id="dash-valor" style="margin: 10px 0 0 0; color: #fff; font-size: 32px;">R$ 0,00</h2>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Nº da OS</th>
                    <th>Data</th>
                    <th>Cliente</th>
                    <th>Veículo</th>
                    <th>Mecânico</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-os"></tbody>
        </table>
        <a href="index.html" class="btn-voltar">Voltar ao Painel</a>
    </div>

    <div id="modalFotos" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <h3 id="tituloModal" style="color: #17a2b8;">Fotos da Ordem de Serviço</h3>
            <div id="galeria" class="galeria-fotos"></div>
        </div>
    </div>

    <script>
        const URL_SERVIDOR = '';
        let listaOS = [];

        async function carregarHistorico() {
            try {
                const resposta = await fetch(`${URL_SERVIDOR}/ordens-servico`);
                listaOS = await resposta.json();
                const tbody = document.getElementById('tabela-os');
                tbody.innerHTML = '';
                
                listaOS.forEach(os => {
                    const dataFormatada = os.data ? os.data.split('-').reverse().join('/') : '-';
                    const placa = os.Veiculo ? `${os.Veiculo.placa} (${os.Veiculo.modelo})` : 'Sem Veículo';
                    const clienteNome = (os.Veiculo && os.Veiculo.Cliente) ? os.Veiculo.Cliente.nome : 'Desconhecido';
                    
                    const temFotos = os.foto_1 ? true : false;
                    const botaoFotos = temFotos ? 
                        `<button class="btn-acao btn-fotos" onclick="verFotos(${os.id})" title="Ver Fotos">📷</button>` : '';

                    tbody.innerHTML += `
                        <tr class="linha-os">
                            <td><strong>${os.numero_os}</strong></td>
                            <td>${dataFormatada}</td>
                            <td style="color: #17a2b8;">${clienteNome}</td>
                            <td>${placa}</td>
                            <td style="color: #ffc107;">${os.mecanico || '-'}</td>
                            <td>R$ ${os.valor ? parseFloat(os.valor).toFixed(2) : '0.00'}</td>
                            <td>
                                ${botaoFotos}
                                <button class="btn-acao btn-pdf" onclick="gerarPDF(${os.id})" title="Gerar PDF">📄</button>
                                <button class="btn-acao btn-editar" onclick="editarOS(${os.id})" title="Editar">✏️</button>
                                <button class="btn-acao btn-apagar" onclick="apagarOS(${os.id})" title="Apagar">🗑️</button>
                            </td>
                        </tr>
                    `;
                });

                atualizarDashboard();

            } catch (erro) { console.error("Erro:", erro); }
        }

        function atualizarDashboard() {
            let totalOS = listaOS.length;
            
            let valorTotal = listaOS.reduce((acumulador, os) => {
                let valor = parseFloat(os.valor) || 0;
                return acumulador + valor;
            }, 0);
            
            document.getElementById('dash-qtd').innerText = totalOS;
            document.getElementById('dash-valor').innerText = "R$ " + valorTotal.toFixed(2).replace('.', ',');
        }

        function verFotos(id) {
            const os = listaOS.find(item => item.id === id);
            const galeria = document.getElementById('galeria');
            const titulo = document.getElementById('tituloModal');
            
            titulo.innerText = `📸 Fotos da OS: ${os.numero_os}`;
            galeria.innerHTML = '';

            const fotos = [os.foto_1, os.foto_2, os.foto_3, os.foto_4, os.foto_5, os.foto_6, os.foto_7, os.foto_8];
            
            fotos.forEach((url, index) => {
                if (url) {
                    galeria.innerHTML += `
                        <div class="foto-item">
                            <img src="${url}" alt="Foto ${index + 1}" onclick="window.open('${url}', '_blank')">
                            <a href="${url}" target="_blank" class="btn-download" download>Download</a>
                        </div>
                    `;
                }
            });

            document.getElementById('modalFotos').style.display = "block";
        }

        function fecharModal() { document.getElementById('modalFotos').style.display = "none"; }

        window.onclick = function(event) {
            const modal = document.getElementById('modalFotos');
            if (event.target == modal) fecharModal();
        }

        function filtrarTabela() {
            const termo = document.getElementById('pesquisa').value.toLowerCase();
            document.querySelectorAll('.linha-os').forEach(linha => {
                linha.style.display = linha.innerText.toLowerCase().includes(termo) ? '' : 'none';
            });
        }

        // ==============================================================
        // 📄 GERADOR DE PDF EXECUTIVO (LAYOUT GARAGEM 184 PRO)
        // ==============================================================
        function gerarPDF(id) {
            const os = listaOS.find(item => item.id === id);
            if (!os) return alert("OS não encontrada!");

            const incluirFotos = confirm("📸 Deseja incluir as FOTOS do veículo neste PDF?\n\n- Clique em 'OK' para gerar com fotos (Ideal para WhatsApp).\n- Clique em 'Cancelar' para gerar sem fotos (Ideal para Imprimir).");

            const dataFormatada = os.data ? os.data.split('-').reverse().join('/') : '-';
            const clienteNome = (os.Veiculo && os.Veiculo.Cliente) ? os.Veiculo.Cliente.nome : 'Não informado';
            const placa = os.Veiculo ? os.Veiculo.placa : '---';
            const modelo = os.Veiculo ? os.Veiculo.modelo : '---';
            const ano = os.Veiculo ? os.Veiculo.ano : '---';
            
            const tecnico = os.mecanico ? os.mecanico : 'Não informado';
            const kmEntrada = os.km_entrada ? os.km_entrada : '---';
            const kmSaida = os.km_saida ? os.km_saida : '---';

            const valorMaoObra = os.valor_mao_de_obra ? parseFloat(os.valor_mao_de_obra).toFixed(2) : '0.00';
            const valorPecas = os.valor_pecas ? parseFloat(os.valor_pecas).toFixed(2) : '0.00';
            const valorTotal = os.valor ? parseFloat(os.valor).toFixed(2) : '0.00';

            // Montagem da Tabela de Peças
            let linhasPecasHTML = '';
            if (os.itens && os.itens.length > 0) {
                os.itens.forEach(peca => {
                    linhasPecasHTML += `
                        <tr style="border-bottom: 1px solid #444; background-color: #2a2a2a;">
                            <td style="padding: 6px 8px;">${peca.nome_peca}</td>
                            <td style="padding: 6px 8px; text-align: center;">${peca.quantidade}</td>
                            <td style="padding: 6px 8px; text-align: right;">${parseFloat(peca.valor_unitario).toFixed(2)}</td>
                            <td style="padding: 6px 8px; text-align: right;">${parseFloat(peca.valor_total).toFixed(2)}</td>
                        </tr>`;
                });
            } else {
                linhasPecasHTML = `<tr><td colspan="4" style="padding: 10px; text-align: center; color: #888;">Nenhuma peça registrada</td></tr>`;
            }

            // Montagem das Fotos (Se solicitado)
            let secaoFotosHTML = '';
            if (incluirFotos) {
                const fotos = [os.foto_1, os.foto_2, os.foto_3, os.foto_4, os.foto_5, os.foto_6, os.foto_7, os.foto_8].filter(url => url != null);
                if (fotos.length > 0) {
                    secaoFotosHTML += `
                        <div style="page-break-before: always; margin-top: 20px;">
                            <h3 style="color: #ffc107; text-align: center; border-bottom: 1px solid #555; padding-bottom: 10px; text-transform: uppercase;">📸 Registros do Veículo</h3>
                            <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px;">`;
                    fotos.forEach(fotoUrl => {
                        secaoFotosHTML += `<img src="${fotoUrl}" style="width: 380px; height: 250px; object-fit: cover; border-radius: 5px; border: 2px solid #555;">`;
                    });
                    secaoFotosHTML += `</div></div>`;
                }
            }

            // CRIAÇÃO DO CHASSI DO PDF (HTML INVISÍVEL)
            const elementoPDF = document.createElement('div');
            elementoPDF.innerHTML = `
                <div style="width: 850px; padding: 25px; background-color: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; box-sizing: border-box;">
                    
                    <div style="border: 2px solid #ffc107; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(255,193,7,0.2);">
                        
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #444; padding-bottom: 15px; margin-bottom: 15px; background: linear-gradient(90deg, #1a1a1a 0%, #3a1c00 50%, #1a1a1a 100%); padding: 15px; border-radius: 5px;">
                            <div style="flex: 1; display: flex; align-items: center;">
    <img src="/logo.png" style="max-width: 260px; max-height: 85px; object-fit: contain;" alt="Logo Garagem 184">
</div>
                            <div style="flex: 1; text-align: center;">
                                <h2 style="margin: 0; font-size: 24px; color: #fff;">ORDEM DE SERVIÇO</h2>
                                <h4 style="color: #ffc107; margin: 5px 0 0 0; font-weight: normal;">Orçamento Detalhado</h4>
                            </div>
                            <div style="flex: 1; text-align: right;">
                                <div style="display: inline-block; border: 1px solid #ffc107; padding: 10px 15px; border-radius: 5px; background-color: #000;">
                                    <span style="font-size: 12px; color: #aaa;">Nº OS:</span><br>
                                    <b style="font-size: 20px; color: #fff;">${os.numero_os}</b>
                                </div>
                            </div>
                        </div>
                        
                        <div style="display: flex; border: 1px solid #444; margin-bottom: 15px; background-color: #222;">
                            <div style="flex: 1; border-right: 1px solid #444; padding: 8px 12px;">
                                <span style="font-size: 11px; color: #888;">DATA:</span> <b style="font-size: 14px;">${dataFormatada}</b>
                            </div>
                            <div style="flex: 2; padding: 8px 12px;">
                                <span style="font-size: 11px; color: #888;">CLIENTE:</span> <b style="font-size: 14px;">${clienteNome}</b>
                            </div>
                        </div>

                        <div style="background-color: #333; color: #ffc107; text-align: center; padding: 5px; font-weight: bold; font-size: 12px; border: 1px solid #444; border-bottom: none;">DADOS DO VEÍCULO</div>
                        <div style="display: flex; border: 1px solid #444; margin-bottom: 15px; background-color: #222;">
                            <div style="flex: 1; border-right: 1px solid #444; padding: 8px 12px;">
                                <span style="font-size: 11px; color: #888;">PLACA:</span> <b style="font-size: 14px; text-transform: uppercase;">${placa}</b>
                            </div>
                            <div style="flex: 2; border-right: 1px solid #444; padding: 8px 12px;">
                                <span style="font-size: 11px; color: #888;">MODELO:</span> <b style="font-size: 14px;">${modelo}</b>
                            </div>
                            <div style="flex: 1; padding: 8px 12px;">
                                <span style="font-size: 11px; color: #888;">ANO:</span> <b style="font-size: 14px;">${ano}</b>
                            </div>
                        </div>

                        <div style="display: flex; border: 1px solid #444; margin-bottom: 15px; background-color: #222;">
                            <div style="flex: 1; border-right: 1px solid #444; padding: 8px 12px; text-align: center;">
                                <span style="font-size: 11px; color: #888;">KM ENTRADA:</span> <b style="font-size: 14px;">${kmEntrada}</b>
                            </div>
                            <div style="flex: 1; padding: 8px 12px; text-align: center;">
                                <span style="font-size: 11px; color: #888;">KM SAÍDA:</span> <b style="font-size: 14px;">${kmSaida}</b>
                            </div>
                        </div>

                        <div style="display: flex; gap: 15px; margin-bottom: 15px; align-items: stretch;">
                            
                            <div style="flex: 1.2; display: flex; flex-direction: column; border: 1px solid #444; background-color: #222;">
                                <div style="background-color: #333; color: #ffc107; text-align: center; padding: 5px; font-weight: bold; font-size: 12px; border-bottom: 1px solid #444;">DESCRIÇÃO DOS SERVIÇOS</div>
                                <div style="padding: 12px; white-space: pre-wrap; font-size: 13px; line-height: 1.5; color: #ddd; flex-grow: 1;">${os.descricao}</div>
                            </div>

                            <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #444; background-color: #222;">
                                <div style="background-color: #333; color: #ffc107; text-align: center; padding: 5px; font-weight: bold; font-size: 12px; border-bottom: 1px solid #444;">PEÇAS UTILIZADAS</div>
                                <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
                                    <thead>
                                        <tr style="border-bottom: 1px solid #555; background-color: #111;">
                                            <th style="padding: 6px 8px; text-align: left;">Peça</th>
                                            <th style="padding: 6px 8px; text-align: center;">Qtd</th>
                                            <th style="padding: 6px 8px; text-align: right;">R$ Un.</th>
                                            <th style="padding: 6px 8px; text-align: right;">R$ Total</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${linhasPecasHTML}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                            <div style="flex: 1; font-size: 12px; color: #888;">
                                <p><strong>Técnico Responsável:</strong> ${tecnico}</p>
                                <p style="margin-top: 20px;">_________________________________________<br>Assinatura do Cliente</p>
                            </div>
                            
                            <div style="width: 320px; border: 1px solid #444; background-color: #222;">
                                <div style="background-color: #333; color: #ffc107; text-align: center; padding: 5px; font-weight: bold; font-size: 12px; border-bottom: 1px solid #444;">RESUMO DE VALORES</div>
                                <div style="display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px dotted #555;">
                                    <span style="font-size: 13px; color: #ccc;">MÃO DE OBRA</span>
                                    <b style="font-size: 14px;">R$ ${valorMaoObra}</b>
                                </div>
                                <div style="display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #555;">
                                    <span style="font-size: 13px; color: #ccc;">TOTAL PEÇAS</span>
                                    <b style="font-size: 14px;">R$ ${valorPecas}</b>
                                </div>
                                <div style="display: flex; justify-content: space-between; padding: 12px; background-color: #111;">
                                    <span style="font-size: 16px; font-weight: bold; color: #fff;">TOTAL GERAL</span>
                                    <b style="font-size: 18px; color: #28a745;">R$ ${valorTotal}</b>
                                </div>
                            </div>
                        </div>

                        <div style="margin-top: 20px; text-align: center; font-size: 11px; color: #666; border-top: 1px solid #444; padding-top: 10px;">
                            <span style="color: #ffc107;">★</span> Obrigado pela preferência! Volte sempre. <span style="color: #ffc107;">★</span><br>
                            Gerado pelo Sistema Garagem 184 PRO
                        </div>

                    </div>
                    
                    ${secaoFotosHTML}
                </div>
            `;

            const opcoesPDF = {
                margin:       0,
                filename:     `OS_${os.numero_os}_Garagem184.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#1a1a1a' },
                jsPDF:        { unit: 'px', format: [850, 1100], orientation: 'portrait' }
            };

            // Dispara o download
            html2pdf().set(opcoesPDF).from(elementoPDF).save();
        }

        async function apagarOS(id) {
            if (confirm("🚨 Apagar esta OS?")) {
                await fetch(`${URL_SERVIDOR}/ordens-servico/${id}`, { method: 'DELETE' });
                carregarHistorico();
            }
        }

        async function editarOS(id) {
            const os = listaOS.find(item => item.id === id);
            if (!os) return alert("OS não encontrada!");

            const nDesc = prompt("Nova descrição:", os.descricao);
            const nVal = prompt("Novo valor TOTAL:", os.valor);
            
            if (nDesc !== null && nVal !== null) {
                await fetch(`${URL_SERVIDOR}/ordens-servico/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ descricao: nDesc, valor: parseFloat(nVal.toString().replace(',', '.')) })
                });
                carregarHistorico();
            }
        }

        window.onload = carregarHistorico;
    </script>
</body>
</html>
