<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Garagem 184</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#17a2b8">

    <script>
        // 🔒 Bloqueio de segurança (Atualizado para ler o Token real do banco)
        if (!localStorage.getItem('autenticado_garagem184')) {
            window.location.href = 'login.html';
        }
        
        // Função para o botão de Sair
        function fazerLogout() {
            localStorage.removeItem('autenticado_garagem184');
            window.location.href = 'login.html';
        }
    </script>

    <script>
        // ⚙️ MOTOR DO APP (Service Worker)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ PWA ativado! Motor rodando.', reg))
                    .catch(err => console.error('❌ Erro no PWA:', err));
            });
        }
    </script>

    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?q=80&w=1920&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: Arial, sans-serif; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .painel {
            background-color: rgba(30, 30, 30, 0.9); padding: 40px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; width: 350px;
        }
        
        .logo {
            max-width: 150px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        h1 { color: #28a745; margin-top: 0; margin-bottom: 30px; font-size: 28px; }
        .menu-btn {
            display: block; width: 100%; padding: 15px; margin-bottom: 15px;
            border: none; border-radius: 5px; font-size: 16px; font-weight: bold;
            cursor: pointer; text-decoration: none; color: white; box-sizing: border-box;
        }
        .btn-cliente { background-color: #17a2b8; }
        .btn-veiculo { background-color: #fd7e14; }
        .btn-ordem { background-color: #28a745; }
        .btn-historico { background-color: #007bff; }
        .btn-senha { background-color: #6c757d; margin-top: 10px; }
        .btn-sair { background-color: #dc3545; margin-top: 10px; }
        .menu-btn:hover { opacity: 0.8; }
        
        /* Estilos do Modal de Senha */
        .modal-input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; 
            border: 1px solid #ccc; font-size: 16px; box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="painel">
        <img src="logo.png" alt="Logo Garagem 184" class="logo">
        
        <h1>🛠️ Garagem 184</h1>
        <a href="cadastro-cliente.html" class="menu-btn btn-cliente">👤 Cadastrar Cliente</a>
        <a href="cadastro-veiculo.html" class="menu-btn btn-veiculo">🚗 Cadastrar Veículo</a>
        <a href="ordem-servico.html" class="menu-btn btn-ordem">📋 Nova Ordem de Serviço</a>
        <a href="historico.html" class="menu-btn btn-historico">📜 Consultar Histórico</a>
        
        <button onclick="abrirModalSenha()" class="menu-btn btn-senha">🔑 Trocar Senha</button>
        
        <button onclick="fazerLogout()" class="menu-btn btn-sair">🚪 Sair do Sistema</button>
    </div>

    <div id="modalSenha" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background: white; color: black; padding: 30px; border-radius: 8px; width: 320px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
            <h3 style="margin-top: 0; color: #333;">Alterar Senha</h3>
            <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Digite seus dados para atualizar o acesso.</p>
            
            <input type="email" id="emailTroca" class="modal-input" placeholder="Seu E-mail de Login">
            <input type="password" id="senhaAtualTroca" class="modal-input" placeholder="Senha Atual">
            <input type="password" id="novaSenhaTroca" class="modal-input" placeholder="Nova Senha">
            
            <button onclick="salvarNovaSenha()" class="menu-btn btn-ordem" style="margin-bottom: 10px;" id="btn-salvar-senha">
                Salvar Nova Senha
            </button>
            <button onclick="fecharModalSenha()" class="menu-btn btn-sair" style="margin-top: 0;">
                Cancelar
            </button>
        </div>
    </div>

    <script>
        const URL_SERVIDOR = 'https://shiny-ranna-33techsentrycomunicacao-3810abc5.koyeb.app';

        function abrirModalSenha() {
            document.getElementById('modalSenha').style.display = 'flex';
        }

        function fecharModalSenha() {
            document.getElementById('modalSenha').style.display = 'none';
            document.getElementById('emailTroca').value = '';
            document.getElementById('senhaAtualTroca').value = '';
            document.getElementById('novaSenhaTroca').value = '';
        }

        async function salvarNovaSenha() {
            const email = document.getElementById('emailTroca').value;
            const senhaAtual = document.getElementById('senhaAtualTroca').value;
            const novaSenha = document.getElementById('novaSenhaTroca').value;
            const btnSalvar = document.getElementById('btn-salvar-senha');

            if (!email || !senhaAtual || !novaSenha) {
                alert('⚠️ Por favor, preencha todos os campos!');
                return;
            }

            btnSalvar.innerText = "Salvando...";
            btnSalvar.disabled = true;

            try {
                const resposta = await fetch(`${URL_SERVIDOR}/alterar-senha`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senhaAtual, novaSenha })
                });

                const dados = await resposta.json();

                if (resposta.ok) {
                    alert('✅ ' + dados.mensagem);
                    fecharModalSenha();
                    // Opcional: Forçar logout após trocar a senha para ele entrar com a nova
                    fazerLogout(); 
                } else {
                    alert('❌ Erro: ' + dados.erro);
                }
            } catch (erro) {
                console.error(erro);
                alert('❌ Erro ao conectar com o servidor.');
            } finally {
                btnSalvar.innerText = "Salvar Nova Senha";
                btnSalvar.disabled = false;
            }
        }
    </script>
</body>
</html>
