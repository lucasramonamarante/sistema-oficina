<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Cliente - Garagem 184 PRO</title>
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?q=80&w=1920&auto=format&fit=crop');
            background-size: cover; background-position: center; font-family: Arial, sans-serif; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .container { background-color: rgba(30, 30, 30, 0.95); padding: 30px; border-radius: 10px; width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); border-top: 5px solid #17a2b8;}
        h2 { text-align: center; color: #17a2b8; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #ccc;}
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 5px; border: 1px solid #555; background-color: #222; color: white; box-sizing: border-box; font-size: 16px;}
        input:focus { border-color: #17a2b8; outline: none; }
        button { width: 100%; padding: 14px; margin-top: 25px; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; background-color: #17a2b8; transition: 0.3s;}
        button:hover { background-color: #138496; transform: scale(1.02); }
        .btn-voltar { background-color: #6c757d; display: block; text-align: center; text-decoration: none; padding: 12px; margin-top: 10px; border-radius: 5px; font-weight: bold; color: white; transition: 0.3s;}
        .btn-voltar:hover { background-color: #5a6268; }
    </style>
</head>
<body>
    <div class="container">
        <h2>👤 Cadastrar Cliente</h2>
        <form id="form-cliente">
            <label>Nome Completo:</label>
            <input type="text" id="nome" placeholder="Ex: João da Silva" required>
            
            <label>CPF:</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>

            <label>Telefone / WhatsApp:</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
            
            <label>E-mail (Opcional):</label>
            <input type="email" id="email" placeholder="cliente@email.com">
            
            <button type="submit" id="btn-salvar">Salvar Cliente</button>
        </form>
        <a href="index.html" class="btn-voltar">Voltar ao Painel</a>
    </div>

    <script>
        const URL_SERVIDOR = 'https://shiny-ranna-33techsentrycomunicacao-3810abc5.koyeb.app';

        // 🛠️ MÁSCARA DO CPF
        document.getElementById('cpf').addEventListener('input', function(e) {
            let valor = e.target.value.replace(/\D/g, ""); 
            if (valor.length > 11) valor = valor.slice(0, 11);
            valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
            valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
            valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            e.target.value = valor;
        });

        // 🛠️ MÁSCARA DO TELEFONE
        document.getElementById('telefone').addEventListener('input', function(e) {
            let valor = e.target.value.replace(/\D/g, "");
            if (valor.length > 11) valor = valor.slice(0, 11);
            valor = valor.replace(/^(\d{2})(\d)/g, "($1) $2");
            valor = valor.replace(/(\d)(\d{4})$/, "$1-$2");
            e.target.value = valor;
        });

        // 🚀 FUNÇÃO DE SALVAR COM TRAVA DE CPF BLINDADA
        document.getElementById('form-cliente').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const btnSalvar = document.getElementById('btn-salvar');
            btnSalvar.innerText = "Verificando..."; 
            btnSalvar.disabled = true;

            const cpfDigitado = document.getElementById('cpf').value;
            // Limpa o CPF para ter só os números na hora de comparar
            const cpfLimpoDigitado = cpfDigitado.replace(/\D/g, '');

            const dados = {
                nome: document.getElementById('nome').value,
                cpf: cpfDigitado,
                telefone: document.getElementById('telefone').value,
                email: document.getElementById('email').value
            };

            try {
                // 1º PASSO: Busca e compara SÓ OS NÚMEROS do CPF
                const respostaBusca = await fetch(`${URL_SERVIDOR}/clientes`);
                if (respostaBusca.ok) {
                    const clientes = await respostaBusca.json();
                    
                    const clienteDuplicado = clientes.find(c => {
                        const cpfBanco = c.cpf ? c.cpf.replace(/\D/g, '') : '';
                        return cpfBanco === cpfLimpoDigitado;
                    });

                    // Se achou, TRAVA!
                    if (clienteDuplicado) {
                        alert(`🛑 ALERTA: O CPF ${cpfDigitado} já pertence a: ${clienteDuplicado.nome}`);
                        btnSalvar.innerText = "Salvar Cliente";
                        btnSalvar.disabled = false;
                        return; // O retorno impede o salvamento
                    }
                }

                // 2º PASSO: Salva se passou no teste
                const respostaSalvar = await fetch(`${URL_SERVIDOR}/clientes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (respostaSalvar.ok) {
                    alert("✅ Cliente cadastrado com sucesso!");
                    document.getElementById('form-cliente').reset(); 
                } else {
                    alert("❌ Erro ao cadastrar o cliente.");
                }
            } catch (erro) {
                console.error("Erro:", erro);
                alert("Erro de conexão com o servidor. Verifique sua internet.");
            } finally {
                btnSalvar.innerText = "Salvar Cliente";
                btnSalvar.disabled = false;
            }
        });
    </script>
</body>
</html>
